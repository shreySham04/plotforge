spring.application.name=writerapp
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

spring.datasource.url=jdbc:mysql://localhost:3306/moosty?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:R2hQb0RjQjFnWm1uVUV1QzB4aG0xVnNtMVB6N2VwS1NhVmVCcjQ4UUN4cg==}
app.jwt.expiration-ms=86400000
app.frontend.base-url=${FRONTEND_BASE_URL:https://plotforge-liard.vercel.app}
app.tmdb.api-key=${TMDB_API_KEY:}
app.owner.username=ShreySHam

app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@plotforge.app}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
