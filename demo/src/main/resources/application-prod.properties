# ===============================
# SERVER
# ===============================
server.port=${PORT}

# ===============================
# DATABASE (Railway / Local fallback)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/moosty?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# CONNECTION POOL (Hikari - tuned)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000

# ===============================
# JWT CONFIG
# ===============================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ===============================
# FRONTEND CONFIG
# ===============================
app.frontend.base-url=${FRONTEND_BASE_URL:https://plotforge-liard.vercel.app}

# ===============================
# TMDB API
# ===============================
app.tmdb.api-key=${TMDB_API_KEY:}

# ===============================
# APP OWNER
# ===============================
app.owner.username=${APP_OWNER_USERNAME:ShreySHam}

# ===============================
# SWAGGER
# ===============================
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# ERROR HANDLING (Production Safe)
# ===============================
server.error.include-stacktrace=never
