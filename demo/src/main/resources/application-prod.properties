spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/moosty?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}
app.tmdb.api-key=${TMDB_API_KEY:}
app.owner.username=${APP_OWNER_USERNAME:ShreySHam}

springdoc.swagger-ui.path=/swagger-ui.html
server.port=${PORT:8080}
